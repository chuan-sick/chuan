<!DOCTYPE html>

<head>

    <title>本子 - 传奇站长的启航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #fdf3f6;
            padding: 30px;
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* 顶部导航（和你主页风格一样） */
        .navbar {
            width: 100%;
            background-color: rgba(255, 183, 197, 0.9);
            padding: 18px 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .nav-list {
            display: flex;
            justify-content: flex-start;
            list-style: none;
            gap: 50px;
        }

        .nav-list a {
            text-decoration: none;
            color: #333;
            font-size: 18px;
            font-weight: bold;
        }

        .nav-list a:hover {
            color: #ff3366;
            transition: 0.2s;
        }

        /* 作品卡片容器 */
        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* 你要的单个信息卡片 */
        .card {
            display: flex;
            align-items: center;
            background: white;
            width: 100%;
            height: 160px;
            border-radius: 12px;
            padding: 10px;
            gap: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.08);
        }

        /* 左侧图片（你要求：占满高度，只留一点空） */
        .card img {
            height: 140px;
            width: 140px;
            object-fit: cover;
            border-radius: 8px;
        }

        /* 右侧文字区域 */
        .info {
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
            gap: 8px;
        }

        /* 名字（上方，大字，占一行） */
        .name {
            font-size: 24px;
            font-weight: bold;
            color: #222;
        }

        /* 作者（中间，稍小） */
        .author {
            font-size: 16px;
            color: #555;
        }

        /* 数字（下方，和作者一样大） */
        .num {
            font-size: 16px;
            color: #777;
        }

    </style>
</head>
